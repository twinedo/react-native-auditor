name: Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            binary: rn-auditor
            smoke-test: false
          - platform: darwin-x64
            runner: macos-latest
            target: x86_64-apple-darwin
            binary: rn-auditor
            smoke-test: false
          - platform: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: rn-auditor
            smoke-test: true
          - platform: win32-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: rn-auditor.exe
            smoke-test: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build -p react-native-auditor --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.platform }}"
          cp \
            "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
            "dist/${{ matrix.platform }}/${{ matrix.binary }}"

      - name: Mark Unix binary executable
        if: runner.os != 'Windows'
        shell: bash
        run: chmod +x "dist/${{ matrix.platform }}/${{ matrix.binary }}"

      - name: Smoke test binary
        if: matrix.smoke-test
        shell: bash
        run: '"dist/${{ matrix.platform }}/${{ matrix.binary }}" --version'

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: rn-auditor-${{ matrix.platform }}
          path: dist/${{ matrix.platform }}
          if-no-files-found: error
